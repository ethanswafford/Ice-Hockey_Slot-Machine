<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>HAT TRICK SLOTS</title>
    <meta name="HAT TRICK SLOTS" content="Casino Game">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/index.css">
</head>

<body>
    <div class="reels">
        <div class="reel" id="reel1">
            <div class="symbol" id="symbol1"></div>
            <div class="symbol" id="symbol2"></div>
            <div class="symbol" id="symbol3"></div>
        </div>
        <div class="reel" id="reel2">
            <div class="symbol" id="symbol4"></div>
            <div class="symbol" id="symbol5"></div>
            <div class="symbol" id="symbol6"></div>
        </div>
        <div class="reel" id="reel3">
            <div class="symbol" id="symbol7"></div>
            <div class="symbol" id="symbol8"></div>
            <div class="symbol" id="symbol9"></div>
        </div>
        <div class="controls">
            <button id="bet-decrease">-</button>
            <button id="spin">SPIN</button>
            <button id="bet-increase">+</button>
        </div>
    </div>

    <div class="slot-machine">
        <div class="HUD">
            <h1>HAT TRICK SLOTS</h1>
            <p class="balance">Balance: $<span id="balance">1000</span></p>
            <p class="bet">Bet: $<span id="bet">10</span></p>
        </div>
    </div>

    <script src="/js/app.js" async defer></script>
</body>

</html>
